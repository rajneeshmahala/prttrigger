name: Deploy Debug

on:
  workflow_run:
    workflows:
      - Demo Build Pipeline (CI + Docker + Trivy)
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Print event
        run: |
          echo "Triggered!"
          echo "Workflow: ${{ github.event.workflow_run.name }}"
          echo "Branch: ${{ github.event.workflow_run.head_branch }}"
          echo "Status: ${{ github.event.workflow_run.conclusion }}"