name: Build Pipeline

on:
  push:
    branches:
      - ConsoliDate/*

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
# Extract branch info
      - name: Extract branch info
        id: vars
        run: |
          SOURCE_BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Processing: $SOURCE_BRANCH"

          APP=$(echo "$SOURCE_BRANCH" | cut -d'/' -f2 | cut -d'-' -f1)

          TARGET_BRANCH="QA/${APP}"

          echo "source=$SOURCE_BRANCH" >> $GITHUB_OUTPUT
          echo "target=$TARGET_BRANCH" >> $GITHUB_OUTPUT
          echo "app=$APP" >> $GITHUB_OUTPUT

          echo "Target Branch: $TARGET_BRANCH"

      # Check if QA branch exists
      - name: Configu nbre Git
        run: |
           git config user.name "github-actions"
           git config user.email "github-actions@github.com"
      - name: Check if QA branch exists
        id: check
        run: |
          git fetch origin

          if git ls-remote --exit-code --heads origin "${{ steps.vars.outputs.target }}"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "QA branch exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "QA branch will be created"
          fi

      # Create QA branch if missing
      - name: Create QA branch
        if: steps.check.outputs.exists == 'false'
        run: |
          TARGET="${{ steps.vars.outputs.target }}"

          echo "Creating $TARGET from default branch"
          git checkout origin/${{ github.event.repository.default_branch }} -b "$TARGET"
          git push origin "$TARGET"

      # Fetch QA branch if exists
      - name: Fetch target branch
        if: steps.check.outputs.exists == 'true'
        run: |
          git fetch origin "${{ steps.vars.outputs.target }}"
      - name: Check merge conflict
        if: steps.check.outputs.exists == 'true'
        run: |
          SOURCE=${{ steps.vars.outputs.source }}
          TARGET=${{ steps.vars.outputs.target }}

          git checkout $SOURCE

          git merge origin/$TARGET --no-commit --no-ff || echo "MERGE_FAILED=true" >> $GITHUB_ENV

          if [ "$MERGE_FAILED" = "true" ]; then
            echo "❌ Merge conflict detected with $TARGET"
            exit 1
          else
            echo "✅ No conflicts"
          fi

          git merge --abort || true

      # ✅ Create PR ONLY if branch already existed
      - name: Create Pull Request
        if: steps.check.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          SOURCE=${{ steps.vars.outputs.source }}
          TARGET=${{ steps.vars.outputs.target }}

          echo "Creating PR: $SOURCE → $TARGET"

          EXISTING=$(gh pr list --base "$TARGET" --head "$SOURCE" --state open --json number --jq '.[0].number')

          if [ -z "$EXISTING" ]; then
            gh pr create \
              --base "$TARGET" \
              --head "$SOURCE" \
              --title "Auto PR: $SOURCE → $TARGET" \
              --body "🚀 Auto-created PR\n\nApp: ${{ steps.vars.outputs.app }}\nSprint: ${{ steps.vars.outputs.sprint }}\nTeam: ${{ steps.vars.outputs.team }}"
          else
            echo "✅ PR #$EXISTING already exists. Skipping."
          fi

      # ✅ Final summary
      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.exists }}" == "false" ]; then
            echo "✔ WIP branch created. No PR needed."
          else
            echo "✔ WIP branch existed. PR handled."
          fi
    