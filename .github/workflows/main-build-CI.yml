name: main build Docker CI

on:
  push:
    branches:
      - 'main'


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 🔄 Checkout
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🟢 Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          #cache: 'npm'

      # 📦 Install deps
      - name: Install dependencies
        run: npm install

      # 🧪 Run tests
      - name: Run tests
        run: npm test

      # 🏗 Build app
      - name: Build app
        run: npm run build

      # 🔢 Set image name + tag
      - name: Set variables
        run: |
          echo "IMAGE_NAME=node-app" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ github.run_number }}" >> $GITHUB_ENV

      # 🐳 Build Docker image
      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest

