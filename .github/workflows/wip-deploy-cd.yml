name: Deploy to Azure Container App (Demo)

on:
  workflow_run:
    workflows: ["Demo Build Pipeline (CI + Docker + Trivy)"]
    types:
      - completed

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'wip/')
    runs-on: ubuntu-latest

    steps:
      - name: Deployment Step
        run: |
          echo "🚀 Deploying application..."
          echo "Branch: ${{ github.event.workflow_run.head_branch }}"
          echo "Build ID: ${{ github.event.workflow_run.run_number }}"
          echo "✅ Deployed Docker container on Azure Container App"