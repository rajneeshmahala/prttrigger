name: Build Pipeline

on:
  push:
    branches:
      - wip/*

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      # ✅ Extract app + sprint + team
      - name: Extract branch info
        id: vars
        run: |
          SOURCE_BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Processing: $SOURCE_BRANCH"

          # Validate format
          if [[ ! "$SOURCE_BRANCH" =~ ^wip\/[a-zA-Z0-9]+-[0-9]+-team[0-9]+$ ]]; then
            echo "Invalid branch format. Expected: wip/<app>-<sprint>-team<no>"
            exit 1
          fi

          APP=$(echo "$SOURCE_BRANCH" | cut -d'/' -f2 | cut -d'-' -f1)
          SPRINT=$(echo "$SOURCE_BRANCH" | cut -d'-' -f2)
          TEAM=$(echo "$SOURCE_BRANCH" | cut -d'-' -f3)

          # Mapping
          if [ "$APP" = "api" ]; then
            APP="apt"
          fi

          TARGET_BRANCH="consolidate/${APP}-${TEAM}-${SPRINT}"

          echo "source=$SOURCE_BRANCH" >> $GITHUB_OUTPUT
          echo "target=$TARGET_BRANCH" >> $GITHUB_OUTPUT
          echo "app=$APP" >> $GITHUB_OUTPUT
          echo "sprint=$SPRINT" >> $GITHUB_OUTPUT
          echo "team=$TEAM" >> $GITHUB_OUTPUT

          echo "Target Branch: $TARGET_BRANCH"

      # ✅ Check if consolidate branch exists
      - name: Check if consolidate branch exists
        id: check
        run: |
          git fetch origin

          if git ls-remote --exit-code --heads origin "${{ steps.vars.outputs.target }}"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Consolidate branch exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Consolidate branch will be created"
          fi

      # ✅ Create consolidate branch ONLY if missing
      - name: Create consolidate branch
        if: steps.check.outputs.exists == 'false'
        run: |
          TARGET="${{ steps.vars.outputs.target }}"

          echo "Creating $TARGET from main"
          git checkout origin/main -b "$TARGET"
          git push origin "$TARGET"

      # ✅ Fetch target branch (ensure available)
      - name: Fetch target branch
        if: steps.check.outputs.exists == 'true'
        run: |
          git fetch origin "${{ steps.vars.outputs.target }}"

      
   
      # ✅ Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ✅ Install dependencies
      - name: Install dependencies
        run: npm install

      # ✅ Lint
      - name: Run lint
        run: npm run lint

      # ✅ Run tests
      - name: Run tests
        run: npm test

      # ✅ Build project
      - name: Build app
        run: npm run build

      # 🔢 Set Build ID
      - name: Set Build ID
        id: build_vars
        run: |
          echo "BUILD_ID=${{ github.run_number }}" >> $GITHUB_ENV
          echo "IMAGE_NAME=demo-ci-app" >> $GITHUB_ENV

      # 🐳 Build Docker Image with ID
      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:$BUILD_ID .
          docker build -t $IMAGE_NAME:latest .

      # 🔐 Trivy FS Scan
      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          exit-code: 1
          severity: CRITICAL,HIGH

      # 🔐 Trivy Image Scan (using build id)
      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: demo-ci-app:${{ env.BUILD_ID }}
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      # 🚀 Docker Image Push to ACR (Optional)
            # 🚀 Docker Image Push to ACR (Demo Only)
      - name: Docker image push to ACR (Demo)
        run: |
          echo "Logging into ACR: image push to acr"
      #    echo "Tagging image: demo-ci-app:${{ env.BUILD_ID }}"
      #    echo "Target: ${{ secrets.ACR_LOGIN_SERVER }}/demo-ci-app:${{ env.BUILD_ID }}"
      #    echo "🚀 Docker image pushed to Azure Container Registry successfully (simulated)"
     