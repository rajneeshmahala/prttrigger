name: Release build Docker CI

on:
  push:
    branches:
      - 'Release/*'


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 🔄 Checkout
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
# Extract branch info
      - name: Extract branch info
        id: vars
        run: |
          SOURCE_BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Processing: $SOURCE_BRANCH"

          APP=$(echo "$SOURCE_BRANCH" | cut -d'/' -f2 | cut -d'-' -f1)

          TARGET_BRANCH="main"

          echo "source=$SOURCE_BRANCH" >> $GITHUB_OUTPUT
          echo "target=$TARGET_BRANCH" >> $GITHUB_OUTPUT
          echo "app=$APP" >> $GITHUB_OUTPUT

          echo "Target Branch: $TARGET_BRANCH"

      # Check if Release branch exists
      - name: Configure Git
        run: |
           git config user.name "github-actions"
           git config user.email "github-actions@github.com"
      
     
      
      # 🟢 Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          #cache: 'npm'

      # 📦 Install deps
      - name: Install dependencies
        run: npm install

      # 🧪 Run tests
      - name: Run tests
        run: npm test

      # 🏗 Build app
      - name: Build app
        run: npm run build

      # 🔢 Set image name + tag
      - name: Set variables
        run: |
          echo "IMAGE_NAME=node-app" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ github.run_number }}" >> $GITHUB_ENV

      # 🐳 Build Docker image
      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest

      # 🔐 Scan image (Trivy)
  #    - name: Scan Docker image
  #      uses: aquasecurity/trivy-action@0.24.0
  #      with:
  #        iscan-type: fs
  #        scan-ref: .
  #        severity: LOW
  #        exit-code: 0

      # 🚀 (Optional) Push to DockerHub
 #     - name: Login to DockerHub
 #       if: github.ref == 'refs/heads/main'
 #       uses: docker/login-action@v3
 #       with:
 #         username: ${{ secrets.DOCKER_USERNAME }}
 #         password: ${{ secrets.DOCKER_PASSWORD }}
#
 #     - name: Push image
 #       if: github.ref == 'refs/heads/main'
 #       run: |
 #         docker tag node-app:${{ github.run_number }} ${{ secrets.DOCKER_USERNAME }}/node-app:${{ github.run_number }}
 #         docker push ${{ secrets.DOCKER_USERNAME }}/node-app:${{ github.run_number }}
      
 
 # Fetch Release branch if exists 
      - name: Fetch target branch
 #       if: steps.check.outputs.exists == 'true'
        run: |
          git fetch origin "${{ steps.vars.outputs.target }}"
      - name: Check merge conflict
 #       if: steps.check.outputs.exists == 'true'
        run: |
          SOURCE=${{ steps.vars.outputs.source }}
          TARGET=${{ steps.vars.outputs.target }}

          git checkout $SOURCE

          git merge origin/$TARGET --no-commit --no-ff || echo "MERGE_FAILED=true" >> $GITHUB_ENV

          if [ "$MERGE_FAILED" = "true" ]; then
            echo "❌ Merge conflict detected with $TARGET"
            exit 1
          else
            echo "✅ No conflicts"
          fi

          git merge --abort || true

      # ✅ Create PR ONLY if branch already existed
      - name: Create Pull Request
 #       if: steps.check.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          SOURCE=${{ steps.vars.outputs.source }}
          TARGET=${{ steps.vars.outputs.target }}

          echo "Creating PR: $SOURCE → $TARGET"

          EXISTING=$(gh pr list --base "$TARGET" --head "$SOURCE" --state open --json number --jq '.[0].number')

          if [ -z "$EXISTING" ]; then
            gh pr create \
              --base "$TARGET" \
              --head "$SOURCE" \
              --title "Auto PR: $SOURCE → $TARGET" \
              --body "🚀 Auto-created PR\n\nApp: ${{ steps.vars.outputs.app }}\nSprint: ${{ steps.vars.outputs.sprint }}\nTeam: ${{ steps.vars.outputs.team }}"
          else
            echo "✅ PR #$EXISTING already exists. Skipping."
          fi

      # ✅ Final summary
      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.exists }}" == "false" ]; then
            echo "✔ main branch created. No PR needed."
          else
            echo "✔ main branch existed. PR handled."
          fi
    